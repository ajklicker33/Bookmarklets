<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Bookmarklets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
    .bookmarklet {
      display: inline-block;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 12px;
    }
    code {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f8fa;
      padding: 12px;
      border-radius: 10px;
      margin-top: 8px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Bookmarklets</h1>
  <p>Drag the button to your bookmarks bar.</p>

<!-- Copy this div to create a new Card -->
  <div class="card">
    <h2>Microsoft Update Catalog KB x64 Search</h2>
    <p>click the button and paste your desired KB number. Like KB5072653</p>
    <a
      class="bookmarklet"
      href='javascript:window.location="https://www.catalog.update.microsoft.com/Search.aspx?q=x64%20"+prompt("Paste your KB");'
    >
      KBx64
    </a>

    <code>javascript:window.location="https://www.catalog.update.microsoft.com/Search.aspx?q="+prompt("Paste your KB");</code>
  </div>
<!-- Copy this div to create a new Card -->

</body>
</html>
